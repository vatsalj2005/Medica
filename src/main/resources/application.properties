server.port=${PORT:8080}

# Database — reads from environment variables on Render (production)
# Falls back to config.properties locally via DatabaseConfig.java
db.url=${DB_URL:}
db.user=${DB_USER:}
db.password=${DB_PASSWORD:}

# CORS — set to your Vercel URL on Render
spring.web.cors.allowed-origins=${CORS_ORIGIN:http://localhost:3000}

# Serialize LocalDate/LocalTime as "2024-01-15" and "09:30" strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false
